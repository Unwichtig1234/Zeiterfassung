name: Build Desktop Installer

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Code holen
        uses: actions/checkout@v4

      - name: Node installieren
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Abhaengigkeiten installieren
        run: npm install

      - name: Installer bauen
        run: npm run dist

      - name: Ergebnis speichern
        uses: actions/upload-artifact@v4
        with:
          name: zeiterfassung-installer
          path: |
            dist/*.exe
            dist/*.msi
            dist/*.zip
            dist/*.blockmap
